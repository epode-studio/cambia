name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # Publish in dependency order: core → runtime → react → cli.
      - name: Publish @epode/cambia-core
        run: npm publish --access public --workspace @epode/cambia-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @epode/cambia-runtime
        run: npm publish --access public --workspace @epode/cambia-runtime
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @epode/cambia-react
        run: npm publish --access public --workspace @epode/cambia-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @epode/cambia (CLI)
        run: npm publish --access public --workspace @epode/cambia
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
