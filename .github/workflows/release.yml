name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # @cambia/core must publish before the cambia CLI that depends on it.
      - name: Publish @cambia/core
        run: npm publish --access public --workspace @cambia/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cambia
        run: npm publish --access public --workspace cambia
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
